workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build

    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter Pub Get
        script: |
          flutter pub get

      - name: Build Release App
        script: |
          flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r tara_release.ipa Payload

    artifacts:
      - tara_release.ipa