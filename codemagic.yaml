workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable # Change to 'node' or 'xcodes' if using React Native or Native iOS
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS App Bundle
        script: |
          flutter build ios --debug --no-codesign
      - name: Pack IPA
        script: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r unsigned_app.ipa Payload
    artifacts:
      - unsigned_app.ipa