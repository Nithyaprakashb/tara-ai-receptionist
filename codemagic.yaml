workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 60

    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true

    scripts:
      - name: Flutter Pub Get
        script: |
          flutter pub get

      - name: Build Unsigned IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa