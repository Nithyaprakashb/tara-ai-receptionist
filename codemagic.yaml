workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build
    max_build_duration: 60

    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Install Dependencies
        script: |
          flutter pub get

      - name: Build Release iOS App
        script: |
          flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload
          zip -r ../tara_release.ipa .
          cd ..

    artifacts:
      - tara_release.ipa